name: release

# Builds native artifacts per platform and attaches them to the GitHub Release:
#   Windows -> zipped .exe (icon embedded via build.rs)
#   macOS   -> a proper "VIOLET EDGE.app" bundle inside a drag-to-Applications .dmg
#   Linux   -> zipped binary
# Cross-compiling Bevy isn't practical, so each platform builds on its own runner.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach assets to (e.g. v0.2.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-arm64
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps (Bevy needs ALSA + udev)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Build
        run: cargo build --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: (cd target/release && 7z a "../../violet-edge-${TAG}-windows.zip" violet-edge.exe)

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: zip -j "violet-edge-${TAG}-linux.zip" target/release/violet-edge

      - name: Package (macOS .app in a .dmg)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          version="${TAG#v}"
          app="VIOLET EDGE.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp target/release/violet-edge "$app/Contents/MacOS/violet-edge"
          chmod +x "$app/Contents/MacOS/violet-edge"
          rm -rf target   # reclaim disk — the release build fills the runner and hdiutil needs scratch space for the .dmg
          # PNG -> .icns (standard iconset sizes)
          mkdir icon.iconset
          sips -z 16 16     assets/logo.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/logo.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/logo.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/logo.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/logo.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/logo.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/logo.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/logo.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/logo.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/logo.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o "$app/Contents/Resources/icon.icns"
          # Info.plist written inline so this doesn't depend on a repo file that a checked-out tag may lack
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>CFBundleName</key><string>VIOLET EDGE</string>' \
            '<key>CFBundleDisplayName</key><string>VIOLET EDGE</string>' \
            '<key>CFBundleExecutable</key><string>violet-edge</string>' \
            '<key>CFBundleIdentifier</key><string>com.bazstudios.violet-edge</string>' \
            '<key>CFBundleIconFile</key><string>icon</string>' \
            '<key>CFBundlePackageType</key><string>APPL</string>' \
            "<key>CFBundleShortVersionString</key><string>${version}</string>" \
            "<key>CFBundleVersion</key><string>${version}</string>" \
            '<key>LSMinimumSystemVersion</key><string>11.0</string>' \
            '<key>NSHighResolutionCapable</key><true/>' \
            '</dict></plist>' > "$app/Contents/Info.plist"
          # assemble a drag-to-Applications disk image
          mkdir dmgroot
          cp -R "$app" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "VIOLET EDGE" -srcfolder dmgroot -ov -format UDZO "violet-edge-${TAG}-macos-arm64.dmg"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            violet-edge-*.zip
            violet-edge-*.dmg
